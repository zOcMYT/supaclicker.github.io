<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker</title>
    <style>
        body {
            background-color: black;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s'); /* Default background */
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            font-family: Marker Felt, fantasy;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure body takes full viewport height */
        }

        .main-button {
            width: 85%;
            height: 50%;
            font-size: 5vw;
            background-color: purple;
            border: 1vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.05s ease-in-out, font-size 0.3s ease-in-out; /* Smooth font size changes */
            max-width: fit-content; /* Correctly applied */
            box-sizing: border-box; /* Include padding and border in element's total width and height */
        }

        .main-button.glowing {
            filter: blur(10px);
        }

        .upgrade-button {
            width: 50%;
            height: 25%;
            font-size: 3vw;
            background-color: rgb(54, 41, 58);
            border: 1vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            bottom: 5%; /* Position relative to bottom */
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            box-sizing: border-box;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .main-button {
                font-size: 5vw; /* Larger font on smaller screens */
                width: 90%;
                height: 40%;
            }
            .upgrade-button {
                font-size: 5vw;
                width: 80%;
                height: 20%;
                bottom: 2%;
            }
        }

        #dailyRewardContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        #rewardTimer {
            font-size: 1.2em;
        }

        #claimButton {
            background-color: green;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 5px;
        }

        #claimButton:disabled {
            background-color: gray;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="dailyRewardContainer">
        <div id="rewardTimer"></div>
        <button id="claimButton">Claim Daily Reward (1.5x)</button>
    </div>

    <script>
        // --- Constants ---
        const BACKGROUNDS = {
            default: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s',
            level1: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s', // 1 Billion
            level2: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s', // 1 Quadrillion
            level3: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s', // 1 Quintillion
            level4: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s'  // 1 Sextillion
        };

        const FONT_SIZES = {
            default: '5vw',
            large: '4vw',
            larger: '3vw',
            largest: '2vw',
            extraLarge: '1vw',
            extraExtraLarge: '0.9vw'
        };

        const LEVEL_THRESHOLDS = [
            { value: 1_000_000_000n, bg: BACKGROUNDS.level1, fs: FONT_SIZES.large },
            { value: 1_000_000_000_000_000n, bg: BACKGROUNDS.level2, fs: FONT_SIZES.largest }, // Quadrillion
            { value: 1_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level3, fs: FONT_SIZES.extraLarge }, // Quintillion
            { value: 1_000_000_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level4, fs: FONT_SIZES.extraExtraLarge } // Sextillion
        ];

        // Initial upgrade cost and click multiplier
        let currentUpgradeCost = parseInt(localStorage.getItem('upgradeCost')) || 250;
        let clickMultiplier = parseInt(localStorage.getItem('clickMultiplier')) || 1; // Represents maxRng initially
        let maxRng = parseInt(localStorage.getItem('maxRng')) || 5; // Initial max random value

        // Game state
        let timesClicked = BigInt(localStorage.getItem('timesClicked') || 0); // Use BigInt for potentially very large numbers

        // --- DOM Elements ---
        const defButton = document.createElement('button');
        const upgradeClickButton = document.createElement('button');
        let clickSound; // Declare clickSound outside the function

        // Daily Reward Elements
        const claimButton = document.getElementById('claimButton');
        const rewardTimer = document.getElementById('rewardTimer');

        const rewardMultiplier = 1.5;
        const rewardCooldown = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
        let lastClaimTime = localStorage.getItem('lastClaimTime') || 0;

        // --- Functions ---

        /**
         * Applies a visual blur effect to the main button when a high click value is generated.
         */
        function applyNiceEffect(clickValue) {
            if (clickValue >= maxRng * 0.75) {
                defButton.classList.add('glowing');
                setTimeout(() => {
                    defButton.classList.remove('glowing');
                }, 50);
            }
        }

        /**
         * Updates the visual appearance of the main button based on the total clicks.
         * Changes background image and font size for different thresholds.
         */
        function updateVisuals(currentClicks) {
            let applied = false;
            // Iterate through thresholds from highest to lowest to ensure correct application
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (currentClicks >= LEVEL_THRESHOLDS[i].value) {
                    document.body.style.backgroundImage = `url('${LEVEL_THRESHOLDS[i].bg}')`;
                    defButton.style.fontSize = LEVEL_THRESHOLDS[i].fs;
                    applied = true;
                    break; // Stop once the highest applicable threshold is found
                }
            }
            // If no threshold is met, reset to default
            if (!applied) {
                document.body.style.backgroundImage = `url('${BACKGROUNDS.default}')`;
                defButton.style.fontSize = FONT_SIZES.default;
            }
        }

        /**
         * Handles the click event on the main button.
         * Increments click count, updates display, and triggers visual effects.
         */
        function handleMainButtonClick() {
            const numClickRng = BigInt(Math.floor(Math.random() * maxRng)) + 1n; // Use BigInt for random value
            timesClicked += numClickRng;
            defButton.textContent = timesClicked.toLocaleString(); // Format for readability
            applyNiceEffect(numClickRng);
            updateVisuals(timesClicked);
            playSound(); // Play the sound
			saveGame();
        }

        /**
         * Handles the click event on the upgrade button.
         * Upgrades click value if enough points are available.
         */
        function handleUpgradeButtonClick() {
            if (timesClicked >= BigInt(currentUpgradeCost)) {
                timesClicked -= BigInt(currentUpgradeCost);
                currentUpgradeCost = Math.floor(currentUpgradeCost * 2.9); // Upgrade cost increases
                maxRng = Math.floor(maxRng * 3); // Click value multiplier increases
                
                // Update button text and display
                defButton.textContent = timesClicked.toLocaleString();
                upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
                
                // Re-apply visuals in case thresholds were met/unmet by spending
                updateVisuals(timesClicked);
				saveGame();
            }
        }

		function saveGame() {
			localStorage.setItem('timesClicked', timesClicked.toString());
			localStorage.setItem('upgradeCost', currentUpgradeCost);
			localStorage.setItem('maxRng', maxRng);
			localStorage.setItem('clickMultiplier', clickMultiplier);
		}

        function playSound() {
            clickSound.currentTime = 0; // Reset sound to start
            clickSound.play();
        }

        // Daily Reward Functionality

        function updateRewardTimer() {
            const now = Date.now();
            const timeSinceLastClaim = now - lastClaimTime;

            if (timeSinceLastClaim >= rewardCooldown) {
                rewardTimer.textContent = "Reward Ready!";
                claimButton.disabled = false;
            } else {
                const timeLeft = rewardCooldown - timeSinceLastClaim;
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                rewardTimer.textContent = `Time until reward: ${hours}h ${minutes}m ${seconds}s`;
                claimButton.disabled = true;
            }
        }

        function claimDailyReward() {
            timesClicked = BigInt(Math.floor(Number(timesClicked) * rewardMultiplier));
            defButton.textContent = timesClicked.toLocaleString();
            lastClaimTime = Date.now();
            localStorage.setItem('lastClaimTime', lastClaimTime);
            updateVisuals(timesClicked);
            updateRewardTimer();
			saveGame();
        }

        // --- Initialization ---

        // Function to set the audio URL
        function setAudioURL() {
            // Use the provided URL directly
            const audioURL = "https://github.com/zOcMYT/supaclicker.github.io/blob/main/Mouseclick.wav";
            
            // Create audio element
            clickSound = new Audio(audioURL);
            clickSound.preload = 'auto';
        }

        // Set up the 'def button' (the button you click)
        defButton.className = 'main-button'; // Use class for styling
        defButton.textContent = timesClicked.toLocaleString(); // Initial display
        document.body.append(defButton);

        // Set up the 'upgradeClickButton'
        upgradeClickButton.className = 'upgrade-button'; // Use class for styling
        upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        document.body.append(upgradeClickButton);

        // Add event listeners
        defButton.addEventListener('click', handleMainButtonClick);
        upgradeClickButton.addEventListener('click', handleUpgradeButtonClick);
        claimButton.addEventListener('click', claimDailyReward);

        // Initial setup for visuals and display
        updateVisuals(timesClicked); // Set initial background and font size
        defButton.style.fontSize = FONT_SIZES.default; // Ensure default font size is set if no thresholds met

        // Load Audio
        setAudioURL();
        // Note: Touch event listeners are omitted as they were commented out and not explicitly required.
        // If needed, they can be added similarly to click listeners, ensuring they call the same handler functions.

        // Daily Reward Initialization
        lastClaimTime = localStorage.getItem('lastClaimTime') || 0;
        updateRewardTimer();
        setInterval(updateRewardTimer, 1000); // Update every second

    </script>
</body>
</html>

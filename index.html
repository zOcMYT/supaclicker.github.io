<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker Pro</title>
    <link rel="icon" href="https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/refs/heads/main/ButtonIcon.png">

    <style>
        :root {
            --default-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s');
            --level1-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s');
            --level2-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s');
            --level3-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s');
            --level4-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s');
            --font-default: 'Marker Felt', fantasy;
            --font-color: white;
            --ui-overlay-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            background: black var(--default-bg-image) no-repeat center center fixed;
            background-size: cover;
            margin: 0; overflow: hidden;
            font-family: var(--font-default); color: var(--font-color);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: background-image 0.8s ease-in-out;
            user-select: none;
        }

        /* Top Bar: Progress & Rewards */
        #topBar {
            position: absolute; top: 0; width: 100%; height: 80px;
            background: var(--ui-overlay-bg); border-bottom: 2px solid white;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        #progessContainer { width: 300px; height: 20px; background: #333; border: 2px solid white; border-radius: 10px; position: relative; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff00, #ffff00); transition: width 0.3s; }
        #levelText { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.9rem; text-shadow: 1px 1px 2px black; }

        /* Left Bar: Stats */
        #statsContainer {
            position: absolute; left: 20px; bottom: 20px;
            background: var(--ui-overlay-bg); padding: 15px; border-radius: 12px;
            border: 2px solid white; z-index: 100; min-width: 150px;
        }

        /* Right Bar: Shop */
        #shopContainer {
            position: absolute; right: 20px; top: 100px; bottom: 20px;
            width: 280px; background: var(--ui-overlay-bg); padding: 15px;
            border-radius: 12px; border: 2px solid white; z-index: 100;
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }

        .shop-item {
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;
            border: 1px solid #555; cursor: pointer; transition: 0.2s;
        }
        .shop-item:hover { background: rgba(255,255,255,0.2); transform: translateX(-5px); }
        .shop-item:active { transform: scale(0.95); }
        .shop-item.locked { opacity: 0.5; cursor: not-allowed; }

        /* Main Game Elements */
        .main-button {
            width: 350px; height: 350px; font-size: 3rem; 
            border: 10px solid white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative;
            background: rgba(0,0,0,0.5); box-shadow: 0 0 50px rgba(255,255,255,0.2);
            transition: transform 0.05s, box-shadow 0.1s;
        }
        .main-button:active { transform: scale(0.92); box-shadow: 0 0 80px rgba(255,255,255,0.5); }

        .rainbow-strobe {
            animation: rainbowBorder 3s linear infinite, glow 2s ease-in-out infinite alternate;
        }

        @keyframes rainbowBorder {
            0% { border-color: red; } 16% { border-color: orange; } 33% { border-color: yellow; }
            50% { border-color: green; } 66% { border-color: blue; } 83% { border-color: indigo; }
            100% { border-color: violet; }
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
            to { box-shadow: 0 0 50px rgba(255,255,255,0.6); }
        }

        /* Particles */
        .particle {
            position: fixed; pointer-events: none;
            font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 4px black;
            animation: particleFloat 0.7s ease-out forwards; z-index: 1000;
        }
        @keyframes particleFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) rotate(15deg) scale(1.5); opacity: 0; }
        }

        .crit { color: #ffeb3b; font-size: 3.5rem; }

        button#resetButton { background-color: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* Scrollbar */
        #shopContainer::-webkit-scrollbar { width: 5px; }
        #shopContainer::-webkit-scrollbar-thumb { background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="topBar">
        <div id="progessContainer">
            <div id="progressBar"></div>
            <div id="levelText">Level 0: Starter</div>
        </div>
        <div id="dailyRewardContainer">
            <span id="rewardTimer">00:00:00</span>
            <button id="claimButton" style="padding: 5px 15px; background: green; color: white; border: none; border-radius: 5px; cursor: pointer;">Daily Reward</button>
        </div>
        <button id="resetButton">Reset</button>
    </div>

    <div id="statsContainer">
        <div style="font-size: 1.8rem; margin-bottom: 10px;" id="totalClicks">0</div>
        <div><b>CPS (Clicks):</b> <span id="cpsDisplay">0</span></div>
        <div><b>CPM (Clicks):</b> <span id="cpmDisplay">0</span></div>
        <div><b>Auto-CPS:</b> <span id="autoCpsDisplay">0</span></div>
    </div>

    <div id="shopContainer">
        <h2 style="margin:0 0 10px 0; text-align: center;">SHOP</h2>
        <div class="shop-item" id="btnUpgrade">
            <b>Upgrade Click</b><br>
            <span id="upgradeCostDisplay">Cost: 250</span><br>
            <small>Increases Points/Click</small>
        </div>
        <div class="shop-item" id="btnAuto">
            <b>Buy Helper</b><br>
            <span id="autoCostDisplay">Cost: 500</span><br>
            <small>+1 Click Automatically Every Sec</small>
        </div>
    </div>

    <div class="main-button rainbow-strobe" id="mainButton">0</div>

    <script>
        // State
        let timesClicked = BigInt(localStorage.getItem('sc_clicks_v2') || "0");
        let clickPowerLevel = BigInt(localStorage.getItem('sc_pwr_v2') || "5");
        let upgradeCost = BigInt(localStorage.getItem('sc_cost_v2') || "250");
        let autoCPS = parseInt(localStorage.getItem('sc_auto_v2') || "0");
        let autoCost = BigInt(localStorage.getItem('sc_autocost_v2') || "500");
        let lastClaimTime = parseInt(localStorage.getItem('sc_claim_v2') || "0");
        
        let clickHistory = [];

        // Constants
        const RAW_OI = "https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/main/oi%20oi%20oe%20oi%20a%20eye%20eye.mp3";
        const RAW_CLICK = "https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/raw/main/Mouseclick.wav";
        
        const sndClick = new Audio(RAW_CLICK);
        const sndOi = new Audio(RAW_OI);

        const THRESHOLDS = [
            { name: "Starter", val: 0n, bg: 'var(--default-bg-image)' },
            { name: "Billions Club", val: 1_000_000_000n, bg: 'var(--level1-bg-image)' },
            { name: "Quadrillionaire", val: 1_000_000_000_000_000n, bg: 'var(--level2-bg-image)' },
            { name: "Universe", val: 1_000_000_000_000_000_000_000n, bg: 'var(--level3-bg-image)' },
            { name: "God Mode", val: 1_000_000_000_000_000_000_000_000_000n, bg: 'var(--level4-bg-image)' }
        ];

        // Elements
        const mainBtn = document.getElementById('mainButton');
        const totalClicksVal = document.getElementById('totalClicks');
        const progressBar = document.getElementById('progressBar');
        const levelText = document.getElementById('levelText');

        // Logic
        function save() {
            localStorage.setItem('sc_clicks_v2', timesClicked.toString());
            localStorage.setItem('sc_pwr_v2', clickPowerLevel.toString());
            localStorage.setItem('sc_cost_v2', upgradeCost.toString());
            localStorage.setItem('sc_auto_v2', autoCPS.toString());
            localStorage.setItem('sc_autocost_v2', autoCost.toString());
            localStorage.setItem('sc_claim_v2', lastClaimTime.toString());
        }

        function createParticle(x, y, text, isCrit) {
            const p = document.createElement('div');
            p.className = `particle ${isCrit ? 'crit' : ''}`;
            p.textContent = (isCrit ? "🔥 " : "+") + text;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        function updateUI() {
            totalClicksVal.textContent = timesClicked.toLocaleString() + " Points";
            mainBtn.textContent = timesClicked.toLocaleString();
            document.getElementById('upgradeCostDisplay').textContent = "Cost: " + upgradeCost.toLocaleString();
            document.getElementById('autoCostDisplay').textContent = "Cost: " + autoCost.toLocaleString();
            document.getElementById('autoCpsDisplay').textContent = autoCPS;

            // Handle Leveling/Progress
            let currentIdx = 0;
            for(let i=THRESHOLDS.length-1; i>=0; i--) {
                if(timesClicked >= THRESHOLDS[i].val) {
                    currentIdx = i;
                    break;
                }
            }
            
            document.body.style.backgroundImage = THRESHOLDS[currentIdx].bg;
            
            const nextLevel = THRESHOLDS[currentIdx + 1];
            if(nextLevel) {
                const currentThresh = THRESHOLDS[currentIdx].val;
                const nextThresh = nextLevel.val;
                const progress = Number((timesClicked - currentThresh) * 100n / (nextThresh - currentThresh));
                progressBar.style.width = progress + "%";
                levelText.textContent = `World:  ${THRESHOLDS[currentIdx].name} (${progress}%)`;
            } else {
                progressBar.style.width = "100%";
                levelText.textContent = `Max World Reached: ${THRESHOLDS[currentIdx].name}`;
            }
        }

        function handleEventClick(e) {
            if(e) e.preventDefault();
            
            let isCrit = Math.random() < 0.1;
            let gain = BigInt(Math.floor(Math.random() * Number(clickPowerLevel))) + 1n;
            if (isCrit) gain *= 10n;

            timesClicked += gain;
            clickHistory.push(Date.now());
            
            // X/Y coordinates for particles
            const x = e ? e.clientX : window.innerWidth / 2;
            const y = e ? e.clientY : window.innerHeight / 2;
            createParticle(x, y, gain.toLocaleString(), isCrit);

            // Audio logic
            const maxThresh = THRESHOLDS[THRESHOLDS.length - 1].val;
            if (timesClicked >= maxThresh) {
                sndOi.currentTime = 0;
                sndOi.play().catch(()=>{});
            } else {
                sndClick.currentTime = 0;
                sndClick.play().catch(()=>{});
            }

            updateUI();
            save();
        }

        // Shop Bindings
        document.getElementById('btnUpgrade').onclick = () => {
            if(timesClicked >= upgradeCost) {
                timesClicked -= upgradeCost;
                clickPowerLevel = BigInt(Math.floor(Number(clickPowerLevel) * 2.5));
                upgradeCost = BigInt(Math.floor(Number(upgradeCost) * 3));
                updateUI(); save();
            }
        };

        document.getElementById('btnAuto').onclick = () => {
            if(timesClicked >= autoCost) {
                timesClicked -= autoCost;
                autoCPS += 1;
                autoCost = BigInt(Math.floor(Number(autoCost) * 2));
                updateUI(); save();
            }
        };

        // Loops
        setInterval(() => {
            if(autoCPS > 0) {
                timesClicked += BigInt(autoCPS);
                updateUI();
                save();
            }
        }, 1000);

        setInterval(() => {
            const now = Date.now();
            clickHistory = clickHistory.filter(t => now - t <= 60000);
            const cps = clickHistory.filter(t => now - t <= 1000).length;
            document.getElementById('cpsDisplay').textContent = cps;
            document.getElementById('cpmDisplay').textContent = clickHistory.length;
        }, 100);

        // Standard event listeners
        mainBtn.addEventListener('mousedown', handleEventClick);
        
        // Block default keys and make them click
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.code === 'Space') {
                handleEventClick();
            }
        });

        // Daily Reward
        function updateTimer() {
            const diff = (24 * 60 * 60 * 1000) - (Date.now() - lastClaimTime);
            if (diff <= 0) {
                document.getElementById('rewardTimer').textContent = "READY!";
                document.getElementById('claimButton').disabled = false;
            } else {
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('rewardTimer').textContent = `${h}h ${m}m ${s}s`;
                document.getElementById('claimButton').disabled = true;
            }
        }
        document.getElementById('claimButton').onclick = () => {
            timesClicked += (timesClicked / 2n) + 100n;
            lastClaimTime = Date.now();
            updateUI(); save();
        };

        document.getElementById('resetButton').onclick = () => {
            if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); }
        }

        setInterval(updateTimer, 1000);
        updateUI(); updateTimer();
    </script>
</body>
</html>
